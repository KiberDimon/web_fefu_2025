version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: web_2025_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: django/Dockerfile
    container_name: web_2025_web
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    expose:
      - "8000"

  nginx:
    build:
      context: .
    # по умолчанию Dockerfile возьмёт nginx/Dockerfile
      dockerfile: nginx/Dockerfile
    container_name: web_2025_nginx
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media

volumes:
  postgres_data:
  static_volume:
  media_volume:
